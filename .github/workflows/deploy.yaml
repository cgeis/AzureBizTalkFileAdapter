name: Deploy to Azure
on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [DEV, PRE, PROD]
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'DEV' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      - run: dotnet build src/FileAdapterFunction/FileAdapterFunction.csproj --configuration Release
      - run: dotnet publish src/FileAdapterFunction/FileAdapterFunction.csproj --configuration Release --output publish
      - uses: azure/login@v2
        with: { creds: ${{ secrets.AZURE_CREDENTIALS }} }
      - uses: azure/functions-action@v1
        with:
          app-name: func-biztalkfile-${{ inputs.environment || 'dev' }}
          package: publish